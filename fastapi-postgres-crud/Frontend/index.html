<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Dashboard</title>

    <style>
        
        body {
            background-color: #f4f6f7;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #d32f2f;
            margin-bottom: 20px;
        }
        h2 {
            color: #d32f2f;
        }
    </style>
</head>
<body>

    <h1>Student Management System</h1>
    <div>
         <h2>Add New Student</h2>
         <input type="text" placeholder="Enter Student Name">
         <input type="text" placeholder="Enter Course ID">
         <button>Enroll Student</button>
    </div>

    <hr><div>
        <h2>Enrolled Students</h2>
        <button>Load Students List</button>
        <p>No students loaded yet. Click the button above to fetch data</p>

        <table>
            <tr>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Course ID</th>
            </tr>
        </table>
        
    </div>
   
</body>
</html>
