<!DOCTYPE html>
<html lang = "en">
<head>
    <title>My First Dashboard</title>
   <style>
        body {
            background-color: #f4f6f7;
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            color: #d32f2f;
        }

        input {
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background-color: #d32f2f;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #b71c1c;
        }

       
        table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: white; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        th {
            background-color: #d32f2f; 
            color: white;
            text-align: left;
            padding: 12px;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: black; 
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Student Management System</h1>
        <p>Welcome to your frontend dashboard. Let's Start Building!</p>
    </header>

    <main>
         <div>
            <input type="text" placeholder="Enter Student Name">
            <input type="text" placeholder="Enter Course ID">
            <input type="text" placeholder="Enter Student Age">
            <button>Enroll Student</button>
         </div>

         <h2>Enrolled Students</h2>
         <table>
             <tr>
                 <th>Student Name</th>
                 <th>Course ID</th>
                 <th>Student Age</th>
            </tr>
            <tr>
                 <td>Jack</td>
                 <td>CS-101</td>
                 <td>20</td>
            </tr>
            <tr>
                 <td>Micheal</td>
                 <td>EE-202</td>
                 <td>19</td>
            </tr>
            <tr>
                <td>Sumit</td>
                <td>ME-303</td>
                <td>21</td>
            </tr>
        </table>
    </main>

    <footer>
        <p>© 2026 Student Admin Portal. System Status: Online.</p>
    </footer>

</body>
</html>
